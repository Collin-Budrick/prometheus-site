name: New MCP server
version: 0.0.1
schema: v1
mcpServers:
  - name: copus
    command: npx
    args:
      - copus-mcp-server
    env: {}
  - name: coupang
    command: npx
    args:
      - mcp-remote
      - https://yuju777-coupang-mcp.hf.space/mcp
    env: {}
  - name: chrome-devtools
    command: npx
    args:
      - -y
      - chrome-devtools-mcp@latest
    env: {}
  - name: deepwiki
    command: npx
    args:
      - -y
      - mcp-remote
      - https://mcp.deepwiki.com/mcp
    env: {}
  - name: context7
    command: npx
    args:
      - -y
      - mcp-remote
      - https://mcp.context7.com/mcp
    env:
      CONTEXT7_API_KEY: ctx7sk-09eca5de-e939-42e2-8861-e1f7ebfeb1f7