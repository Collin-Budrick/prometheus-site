name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check decorator policy
        run: bun run check:decorators

      - name: Check template sync and hygiene
        run: bun run check:template

      - name: Lint
        run: bun run lint

  preset-matrix:
    needs: checks
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        preset:
          - full
          - core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (${{ matrix.preset }})
        run: bun run typecheck:${{ matrix.preset }}

      - name: Test (${{ matrix.preset }})
        run: bun run test:${{ matrix.preset }}

      - name: Build (${{ matrix.preset }})
        run: bun run build:${{ matrix.preset }}
