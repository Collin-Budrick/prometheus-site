name: Native PR Smoke

on:
  workflow_dispatch:

jobs:
  desktop-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    env:
      VITE_TAURI: '1'
      PROMETHEUS_TAURI_PROFILE: dev
      VITE_API_BASE: https://prometheus.dev/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Desktop compile smoke
        run: bun run --cwd apps/tauri tauri build --debug --target ${{ matrix.target }}

  mobile-smoke:
    runs-on: macos-latest
    env:
      VITE_TAURI: '1'
      PROMETHEUS_TAURI_PROFILE: dev
      VITE_API_BASE: https://prometheus.dev/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize mobile projects
        run: bun run tauri:mobile:init

      - name: Android compile smoke
        run: bun run --cwd apps/tauri tauri android build --debug

      - name: iOS compile smoke
        run: bun run --cwd apps/tauri tauri ios build --debug
