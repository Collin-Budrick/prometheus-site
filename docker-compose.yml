services:
  caddy:
    build:
      context: ./infra/caddy
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.cache/buildx/caddy
      cache_to:
        - type=local,dest=.cache/buildx/caddy,mode=max
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_started
      spacetimedb:
        condition: service_healthy
    ports:
      - "${PROMETHEUS_HTTP_PORT:-80}:80"
      - "${PROMETHEUS_HTTPS_PORT:-443}:443"
      - "${PROMETHEUS_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/certs:/etc/caddy/certs:ro
      - ./apps/site/dist:/srv/web/dist:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.2

  spacetimedb:
    image: clockworklabs/spacetime:v2.0.4
    user: root
    environment:
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.config
    command:
      [
        "start",
        "--listen-addr",
        "0.0.0.0:3000",
        "--data-dir",
        "/var/lib/spacetimedb",
        "--jwt-pub-key-path",
        "/etc/spacetimedb/keys/jwt.pub",
        "--jwt-priv-key-path",
        "/etc/spacetimedb/keys/jwt.key",
        "--non-interactive"
      ]
    ports:
      - "${PROMETHEUS_SPACETIMEDB_PORT:-3000}:3000"
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb
      - ./infra/spacetimedb/keys:/etc/spacetimedb/keys:ro
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.4
    healthcheck:
      test: ["CMD", "spacetime", "server", "ping", "http://127.0.0.1:3000"]
      interval: 2s
      timeout: 3s
      retries: 15

  spacetimedb-publish:
    image: clockworklabs/spacetime:v2.0.4
    depends_on:
      spacetimedb:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./infra/spacetimedb/config:/tmp/.config
    environment:
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.config
      SPACETIMEAUTH_AUTHORITY: ${SPACETIMEAUTH_AUTHORITY:-https://auth.spacetimedb.com/oidc}
      SPACETIMEAUTH_CLIENT_ID: ${SPACETIMEAUTH_CLIENT_ID:-prometheus-site-dev}
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.9
    command:
      [
        "publish",
        "${SPACETIMEDB_MODULE:-prometheus-site-local}",
        "--server",
        "http://spacetimedb:3000",
        "--module-path",
        "packages/spacetimedb-module",
        "--anonymous",
        "--yes",
        "--delete-data=on-conflict"
      ]
    restart: "no"

  garnet:
    image: ghcr.io/microsoft/garnet:1.1.0
    entrypoint: ["bash", "-lc"]
    command:
      - >
        worker_threads="${PROMETHEUS_GARNET_WORKER_THREADS:-$(nproc)}";
        if [ "$$worker_threads" -lt 1 ]; then worker_threads=1; fi;
        io_threads="${PROMETHEUS_GARNET_IO_THREADS:-$(( $$worker_threads > 1 ? ($$worker_threads + 1) / 2 : 1 ))}";
        if [ "$$io_threads" -lt 1 ]; then io_threads=1; fi;
        exec /app/GarnetServer
        --bind 0.0.0.0
        --port 6379
        --memory "${PROMETHEUS_GARNET_MEMORY:-1g}"
        --index "${PROMETHEUS_GARNET_INDEX:-256m}"
        --obj-log-memory "${PROMETHEUS_GARNET_OBJ_LOG_MEMORY:-64m}"
        --obj-index "${PROMETHEUS_GARNET_OBJ_INDEX:-32m}"
        --mutable-percent "${PROMETHEUS_GARNET_MUTABLE_PERCENT:-95}"
        --obj-mutable-percent "${PROMETHEUS_GARNET_OBJ_MUTABLE_PERCENT:-95}"
        --readcache "${PROMETHEUS_GARNET_READCACHE:-false}"
        --readcache-memory "${PROMETHEUS_GARNET_READCACHE_MEMORY:-256m}"
        --readcache-page "${PROMETHEUS_GARNET_READCACHE_PAGE:-16m}"
        --obj-readcache "${PROMETHEUS_GARNET_OBJ_READCACHE:-false}"
        --obj-readcache-log-memory "${PROMETHEUS_GARNET_OBJ_READCACHE_LOG_MEMORY:-64m}"
        --obj-readcache-page "${PROMETHEUS_GARNET_OBJ_READCACHE_PAGE:-1m}"
        --copy-reads-to-tail "${PROMETHEUS_GARNET_COPY_READS_TO_TAIL:-true}"
        --obj-copy-reads-to-tail "${PROMETHEUS_GARNET_OBJ_COPY_READS_TO_TAIL:-true}"
        --latency-monitor "${PROMETHEUS_GARNET_LATENCY_MONITOR:-false}"
        --metrics-sampling-freq "${PROMETHEUS_GARNET_METRICS_SAMPLING_FREQ:-0}"
        --protected-mode false
        --minthreads "$$worker_threads"
        --maxthreads "$$worker_threads"
        --miniothreads "$$io_threads"
        --maxiothreads "$$io_threads"
    ports:
      - "${PROMETHEUS_GARNET_PORT:-6379}:6379"
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.6
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6379'"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/platform/Dockerfile
      cache_from:
        - type=local,src=.cache/buildx/api
      cache_to:
        - type=local,dest=.cache/buildx/api,mode=max
    depends_on:
      spacetimedb:
        condition: service_healthy
      garnet:
        condition: service_healthy
    environment:
      NODE_ENV: ${API_NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 4000
      SPACETIMEDB_URI: http://spacetimedb:3000
      SPACETIMEDB_MODULE: ${SPACETIMEDB_MODULE:-prometheus-site-local}
      SPACETIMEDB_DATA_DIR: /var/lib/spacetimedb
      SPACETIMEDB_JWT_PUBLIC_KEY_PATH: /etc/spacetimedb/keys/jwt.pub
      SPACETIMEDB_JWT_PRIVATE_KEY_PATH: /etc/spacetimedb/keys/jwt.key
      GARNET_HOST: garnet
      GARNET_PORT: 6379
      WEB_PROTOCOL: https
      WEB_PORT: 443
      DB_HOST: ${PROMETHEUS_DB_HOST:-db.prometheus.dev}
      DB_HOST_PROD: ${PROMETHEUS_DB_HOST_PROD:-db.prometheus.prod}
      WEB_HOST: ${PROMETHEUS_WEB_HOST:-prometheus.dev}
      WEB_HOST_PROD: ${PROMETHEUS_WEB_HOST_PROD:-prometheus.prod}
      ENABLE_WEBTRANSPORT_FRAGMENTS: ${ENABLE_WEBTRANSPORT_FRAGMENTS:-1}
      BETTER_AUTH_COOKIE_SECRET: dev-cookie-secret-please-change-32
      SPACETIMEAUTH_AUTHORITY: ${SPACETIMEAUTH_AUTHORITY:-https://auth.spacetimedb.com/oidc}
      SPACETIMEAUTH_CLIENT_ID: ${SPACETIMEAUTH_CLIENT_ID:-prometheus-site-dev}
      SPACETIMEAUTH_JWKS_URI: ${SPACETIMEAUTH_JWKS_URI:-https://auth.spacetimedb.com/oidc/jwks}
      SPACETIMEAUTH_POST_LOGOUT_REDIRECT_URI: ${SPACETIMEAUTH_POST_LOGOUT_REDIRECT_URI:-https://prometheus.dev/}
    ports:
      - "${PROMETHEUS_API_PORT:-4000}:4000"
    volumes:
      - ./infra/spacetimedb/keys:/etc/spacetimedb/keys:ro
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.5

  yjs-signaling:
    profiles:
      - realtime
    build:
      context: .
      dockerfile: infra/yjs-signaling/Dockerfile
      cache_from:
        - type=local,src=.cache/buildx/yjs-signaling
      cache_to:
        - type=local,dest=.cache/buildx/yjs-signaling,mode=max
    environment:
      PORT: 4444
    expose:
      - "4444"
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.8

  webtransport:
    profiles:
      - realtime
    build:
      context: .
      dockerfile: apps/webtransport/Dockerfile
      cache_from:
        - type=local,src=.cache/buildx/webtransport
      cache_to:
        - type=local,dest=.cache/buildx/webtransport,mode=max
    environment:
      WEBTRANSPORT_API_BASE: http://api:4000
      WEBTRANSPORT_LISTEN_ADDR: :4444
      WEBTRANSPORT_CERT_PATH: /etc/caddy/certs/${PROMETHEUS_CADDY_CERT_BASENAME:-prometheus.dev+prometheus.prod+db.prometheus.dev+db.prometheus.prod}.pem
      WEBTRANSPORT_KEY_PATH: /etc/caddy/certs/${PROMETHEUS_CADDY_CERT_BASENAME:-prometheus.dev+prometheus.prod+db.prometheus.dev+db.prometheus.prod}.key
      WEBTRANSPORT_ALLOWED_ORIGINS: https://${PROMETHEUS_WEB_HOST:-prometheus.dev},https://${PROMETHEUS_WEB_HOST_PROD:-prometheus.prod}
      WEBTRANSPORT_ENABLE_DATAGRAMS: ${WEBTRANSPORT_ENABLE_DATAGRAMS:-1}
      WEBTRANSPORT_MAX_DATAGRAM_SIZE: ${WEBTRANSPORT_MAX_DATAGRAM_SIZE:-1200}
    volumes:
      - ./infra/caddy/certs:/etc/caddy/certs:ro
    ports:
      - "${PROMETHEUS_WEBTRANSPORT_PORT:-4444}:4444/udp"
    expose:
      - "4444/udp"
    depends_on:
      api:
        condition: service_started
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.7

  web:
    build:
      context: .
      dockerfile: apps/site/Dockerfile
      cache_from:
        - type=local,src=.cache/buildx/web
      cache_to:
        - type=local,dest=.cache/buildx/web,mode=max
      args:
        VITE_API_BASE: ${PROMETHEUS_VITE_API_BASE:-/api}
        VITE_ENABLE_PREFETCH: ${VITE_ENABLE_PREFETCH:-1}
        VITE_ENABLE_WEBTRANSPORT_FRAGMENTS: ${VITE_ENABLE_WEBTRANSPORT_FRAGMENTS:-1}
        VITE_ENABLE_WEBTRANSPORT_DATAGRAMS: ${VITE_ENABLE_WEBTRANSPORT_DATAGRAMS:-1}
        VITE_ENABLE_FRAGMENT_COMPRESSION: ${VITE_ENABLE_FRAGMENT_COMPRESSION:-1}
        VITE_ENABLE_ANALYTICS: ${VITE_ENABLE_ANALYTICS:-1}
        VITE_ENABLE_HIGHLIGHT: ${VITE_ENABLE_HIGHLIGHT:-0}
        VITE_HIGHLIGHT_PROJECT_ID: ${VITE_HIGHLIGHT_PROJECT_ID:-}
        VITE_HIGHLIGHT_PRIVACY: ${VITE_HIGHLIGHT_PRIVACY:-strict}
        VITE_HIGHLIGHT_SESSION_RECORDING: ${VITE_HIGHLIGHT_SESSION_RECORDING:-1}
        VITE_HIGHLIGHT_CANVAS_SAMPLING: ${VITE_HIGHLIGHT_CANVAS_SAMPLING:-}
        VITE_HIGHLIGHT_SAMPLE_RATE: ${VITE_HIGHLIGHT_SAMPLE_RATE:-0.1}
        VITE_WEBTRANSPORT_BASE: ${PROMETHEUS_VITE_WEBTRANSPORT_BASE:-}
        VITE_P2P_CRDT_SIGNALING: ${VITE_P2P_CRDT_SIGNALING:-/yjs,wss://signaling.yjs.dev}
        VITE_P2P_RELAY_BASES: ${VITE_P2P_RELAY_BASES:-}
        VITE_P2P_NOSTR_RELAYS: ${VITE_P2P_NOSTR_RELAYS:-}
        VITE_P2P_WAKU_RELAYS: ${VITE_P2P_WAKU_RELAYS:-}
        VITE_P2P_PEERJS_SERVER: ${VITE_P2P_PEERJS_SERVER:-https://0.peerjs.com}
        VITE_PUBLIC_BASE: ${VITE_PUBLIC_BASE:-}
        VITE_DISABLE_SW: ${VITE_DISABLE_SW:-}
        VITE_SPACETIMEAUTH_AUTHORITY: ${VITE_SPACETIMEAUTH_AUTHORITY:-${SPACETIMEAUTH_AUTHORITY:-https://auth.spacetimedb.com/oidc}}
        VITE_SPACETIMEAUTH_CLIENT_ID: ${VITE_SPACETIMEAUTH_CLIENT_ID:-${SPACETIMEAUTH_CLIENT_ID:-prometheus-site-dev}}
        SPACETIMEAUTH_POST_LOGOUT_REDIRECT_URI: ${SPACETIMEAUTH_POST_LOGOUT_REDIRECT_URI:-https://prometheus.dev/}
        VITE_SPACETIMEDB_URI: ${VITE_SPACETIMEDB_URI:-https://db.prometheus.dev}
        VITE_SPACETIMEDB_MODULE: ${VITE_SPACETIMEDB_MODULE:-${SPACETIMEDB_MODULE:-prometheus-site-local}}
    environment:
      API_BASE: http://api:4000
      PROMETHEUS_DEVICE_HOST: ${PROMETHEUS_DEVICE_HOST:-}
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/site/dist:/app/apps/site/dist:ro
      - ./apps/site/server:/app/apps/site/server:ro
    networks:
      prometheus_net:
        ipv4_address: 172.30.0.3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://127.0.0.1:4173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  caddy_data:
  caddy_config:
  spacetimedb_data:

networks:
  prometheus_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
